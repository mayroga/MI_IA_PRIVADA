services:
  - type: web
    name: al-cielo-factory
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run interface.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
